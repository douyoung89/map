<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>강릉 중앙동 카페 & 먹거리 지도</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=8477ca5a1ad6eed84cc4afcf3fb7e68f&autoload=false"></script>
  <style>
    :root {
      --ink: #1f241c;
      --muted: #6b735f;
      --paper: #fff9e8;
      --leaf: #1f7a5b;
      --leaf-soft: #e7f3dc;
      --berry: #e95f59;
      --sun: #ffc857;
      --sky: #8bd3dd;
      --panel: #fffef8;
      --line: rgba(61, 68, 48, 0.16);
      --shadow: 0 18px 44px rgba(48, 39, 24, 0.2);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 200, 87, 0.42), transparent 22%),
        radial-gradient(circle at 90% 4%, rgba(139, 211, 221, 0.36), transparent 24%),
        linear-gradient(180deg, #fff7dc 0%, #f7f1d8 100%);
      letter-spacing: 0;
      overflow: hidden;
    }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      position: relative;
      z-index: 800;
      padding: max(14px, env(safe-area-inset-top)) 14px 10px;
      background:
        radial-gradient(circle at 8% 18%, rgba(255, 200, 87, 0.24), transparent 24%),
        radial-gradient(circle at 92% 10%, rgba(139, 211, 221, 0.22), transparent 28%),
        rgba(255, 254, 248, 0.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    header::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -9px;
      height: 18px;
      background:
        radial-gradient(circle at 18px 0, transparent 17px, rgba(255,254,248,.94) 18px) 0 0 / 36px 18px repeat-x;
      pointer-events: none;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--leaf-soft);
      color: #176346;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge:first-child::before {
      content: "✦";
      color: #f2a33b;
    }

    h1 {
      margin: 8px 0 0;
      font-size: clamp(25px, 7vw, 38px);
      line-height: 1.04;
      text-shadow: 0 2px 0 #fff2bc;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 11px 0 0;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffdf4;
      color: var(--ink);
      padding: 8px 13px;
      font: inherit;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(42, 33, 15, 0.07);
    }

    button.active {
      border-color: #166747;
      background: linear-gradient(180deg, #2c966e, #1f7a5b);
      color: #fff;
    }

    .map-stage {
      position: relative;
      min-height: 0;
    }

    #map {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 250, 222, 0.8), transparent 35%),
        linear-gradient(180deg, #d9f0cf, #f7edc6);
    }

    .fallback-map {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 249, 232, 0.14), rgba(255, 249, 232, 0.34)),
        url("assets/fairytale-map-aligned.png") center / cover no-repeat,
        linear-gradient(135deg, #d9f0cf, #fff1bd);
    }

    .fallback-map::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 16% 20%, rgba(255, 255, 255, 0.42), transparent 20%),
        radial-gradient(circle at 78% 18%, rgba(139, 211, 221, 0.22), transparent 24%),
        linear-gradient(90deg, rgba(255, 249, 232, 0.18), transparent 45%, rgba(255, 249, 232, 0.2));
      pointer-events: none;
    }

    .map-status {
      position: absolute;
      left: 14px;
      top: 12px;
      z-index: 610;
      max-width: min(310px, calc(100% - 28px));
      margin: 0;
      padding: 8px 11px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 16px;
      background: rgba(255, 254, 248, 0.9);
      color: #51604f;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 10px 26px rgba(45, 38, 25, 0.14);
    }

    .fallback-marker {
      position: absolute;
      z-index: 630;
      min-height: 34px;
      padding: 0;
      transform: translate(-50%, -100%) rotate(-45deg);
    }

    .fallback-popup-wrap {
      position: absolute;
      z-index: 760;
      width: min(278px, calc(100% - 28px));
      max-width: calc(100% - 28px);
      transform: translate(-50%, calc(-100% - 20px));
    }

    .fallback-popup-wrap.below {
      transform: translate(-50%, 20px);
    }

    .fallback-popup-wrap .place-popup {
      margin-bottom: 0;
    }



    .storybook-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      padding: 6px 10px;
      border: 2px solid #fff;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe88f, #f7b84b);
      color: #5c3d08;
      font-size: 12px;
      font-weight: 1000;
      box-shadow: 0 8px 18px rgba(67, 48, 19, 0.18);
      text-shadow: 0 1px rgba(255, 255, 255, 0.65);
      white-space: nowrap;
    }

    .storybook-label.green {
      background: linear-gradient(180deg, #d9f5b6, #7cc983);
      color: #174f31;
    }

    .storybook-label.blue {
      background: linear-gradient(180deg, #c8f2ff, #70c9dc);
      color: #15556a;
    }

    .landmark-card {
      width: 86px;
      min-height: 64px;
      display: grid;
      place-items: center;
      gap: 2px;
      padding: 7px 8px;
      border: 3px solid #fffaf0;
      border-radius: 24px 24px 20px 20px;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,.9), transparent 18%),
        linear-gradient(180deg, #ffe680 0%, #f5b94f 100%);
      color: #5a3a07;
      font-size: 12px;
      font-weight: 1000;
      line-height: 1.08;
      text-align: center;
      box-shadow: 0 12px 26px rgba(78, 57, 22, 0.22);
      transform: rotate(-2deg);
    }

    .landmark-card .icon {
      display: block;
      font-size: 24px;
      line-height: 1;
      filter: drop-shadow(0 2px rgba(255,255,255,.55));
    }

    .landmark-card.market {
      background: linear-gradient(180deg, #ffcf82, #ec7655);
      color: #fff;
    }

    .landmark-card.river {
      background: linear-gradient(180deg, #c9f7ff, #67cadd);
      color: #11556a;
    }

    .landmark-card.park {
      background: linear-gradient(180deg, #d8f4a2, #72bf78);
      color: #174b2e;
    }

    .detail-building {
      width: 30px;
      height: 28px;
      position: relative;
      border: 2px solid #fff8e8;
      border-radius: 7px 7px 5px 5px;
      background: linear-gradient(180deg, #ffe9ae, #f2a95c);
      box-shadow: 0 7px 14px rgba(63, 47, 24, 0.2);
    }

    .detail-building::before {
      content: "";
      position: absolute;
      left: -3px;
      right: -3px;
      top: -9px;
      height: 12px;
      border: 2px solid #fff8e8;
      border-bottom: 0;
      border-radius: 12px 12px 4px 4px;
      background: repeating-linear-gradient(90deg, #e85f55 0 5px, #fff4cf 5px 10px);
      transform: skewX(-8deg);
    }

    .detail-building::after {
      content: "";
      position: absolute;
      left: 7px;
      bottom: 3px;
      width: 6px;
      height: 9px;
      border-radius: 3px 3px 1px 1px;
      background: #7a5830;
      box-shadow: 10px -4px 0 -1px #fff6d2;
    }

    .detail-building.food {
      background: linear-gradient(180deg, #ffc0a8, #e86852);
    }

    .detail-building.food::before {
      background: repeating-linear-gradient(90deg, #2f936e 0 5px, #fff4cf 5px 10px);
    }

    .detail-tree {
      width: 24px;
      height: 28px;
      position: relative;
    }

    .detail-tree::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 0;
      width: 18px;
      height: 18px;
      border: 2px solid #fff8e8;
      border-radius: 50%;
      background: linear-gradient(180deg, #a8df7a, #4caa67);
      box-shadow: -8px 6px 0 -2px #7bc876, 7px 7px 0 -3px #6abd72;
    }

    .detail-tree::after {
      content: "";
      position: absolute;
      left: 11px;
      bottom: 0;
      width: 5px;
      height: 12px;
      border-radius: 4px;
      background: #8d613b;
    }

    .trail-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      border: 2px solid #fff8e8;
      border-radius: 999px;
      background: linear-gradient(180deg, #fff4a8, #ffbc56);
      color: #6b4407;
      font-size: 11px;
      font-weight: 1000;
      box-shadow: 0 8px 18px rgba(74, 52, 18, 0.18);
      white-space: nowrap;
    }

    .zoom-tip {
      position: absolute;
      left: 14px;
      top: 12px;
      z-index: 710;
      max-width: 245px;
      padding: 8px 11px;
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 16px;
      background: rgba(255, 254, 248, 0.9);
      color: #51604f;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 10px 26px rgba(45, 38, 25, 0.14);
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    .map-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 410;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 249, 232, 0.38), transparent 18%),
        radial-gradient(circle at 8% 92%, rgba(255, 200, 87, 0.28), transparent 28%),
        radial-gradient(circle at 88% 82%, rgba(233, 95, 89, 0.18), transparent 26%),
        radial-gradient(circle at 48% 42%, rgba(255, 245, 195, 0.22), transparent 38%);
      mix-blend-mode: multiply;
    }

    .legend {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: calc(116px + env(safe-area-inset-bottom));
      z-index: 700;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 18px;
      background: rgba(255, 254, 248, 0.86);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 34px rgba(45, 38, 25, 0.16);
      scrollbar-width: none;
    }

    .legend::-webkit-scrollbar { display: none; }

    .legend-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      padding: 7px 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, #fffdf0, #fff1bd);
      color: #4b4f38;
      font-size: 12px;
      font-weight: 900;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--leaf);
    }

    .dot.food { background: var(--berry); }

    .bottom-sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 720;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(255, 249, 232, 0), rgba(255, 249, 232, 0.92) 18%, rgba(255, 249, 232, 0.98));
      pointer-events: none;
    }

    .place-rail {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
      pointer-events: auto;
      scrollbar-width: none;
    }

    .place-rail::-webkit-scrollbar { display: none; }

    .mini-card {
      flex: 0 0 222px;
      display: grid;
      grid-template-columns: 66px 1fr;
      gap: 10px;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 20px;
      background: rgba(255, 254, 248, 0.94);
      padding: 9px;
      box-shadow: 0 12px 30px rgba(48, 39, 24, 0.17);
      cursor: pointer;
      white-space: normal;
    }

    .mini-card:active {
      transform: translateY(1px) scale(0.99);
    }

    .mini-card img {
      width: 66px;
      height: 66px;
      border-radius: 16px;
      object-fit: cover;
      background: var(--leaf-soft);
    }

    .mini-card strong {
      display: block;
      font-size: 14px;
      line-height: 1.15;
      white-space: normal;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .mini-card span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      white-space: normal;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .guide-marker {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 3px solid #fff;
      border-radius: 50% 50% 50% 12px;
      background: var(--leaf);
      color: #fff;
      font-size: 13px;
      font-weight: 1000;
      box-shadow: 0 7px 16px rgba(30, 45, 27, 0.28);
      transform: rotate(-45deg);
    }

    .guide-marker span {
      transform: rotate(45deg);
    }

    .guide-marker.food {
      background: var(--berry);
    }

    .place-popup {
      display: block;
      width: min(278px, calc(100vw - 32px));
      overflow: hidden;
      border: 2px solid #fff;
      border-radius: 22px;
      background: var(--panel);
      color: var(--ink);
      text-decoration: none;
      white-space: normal;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .place-popup img {
      width: 100%;
      height: 118px;
      display: block;
      object-fit: cover;
      background: linear-gradient(135deg, #ffe8a8, #b9e5c2);
    }

    .popup-body {
      padding: 10px 11px 12px;
      white-space: normal;
    }

    .popup-kicker {
      display: inline-flex;
      margin-bottom: 4px;
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--leaf-soft);
      color: #176346;
      font-size: 11px;
      font-weight: 900;
    }

    .popup-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 1000;
      white-space: normal;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .popup-desc {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      white-space: normal;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .popup-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }

    .popup-tags span {
      padding: 3px 6px;
      border-radius: 999px;
      background: #fff2c6;
      color: #6a5311;
      font-size: 11px;
      font-weight: 900;
    }

    .open-note {
      margin-top: 9px;
      color: #d14c43;
      font-size: 12px;
      font-weight: 900;
      white-space: normal;
    }



    @media (min-width: 820px) {
      body { overflow: auto; }

      .app {
        min-height: 100vh;
        grid-template-rows: auto minmax(680px, 1fr);
      }

      header {
        padding-left: 24px;
        padding-right: 24px;
      }

      .map-stage {
        margin: 18px auto;
        width: min(1180px, calc(100% - 36px));
        min-height: 680px;
        border: 10px solid rgba(255, 254, 248, 0.78);
        border-radius: 34px;
        overflow: hidden;
        box-shadow: 0 24px 70px rgba(48, 39, 24, 0.22);
      }

      #map {
        min-height: 680px;
      }

      .bottom-sheet {
        padding-left: 18px;
        padding-right: 18px;
      }

      .legend {
        left: 18px;
        right: auto;
        bottom: 132px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topline">
        <span class="badge">GUIDE MAP</span>
        <span class="badge">강릉 중앙동</span>
      </div>
      <h1>카페 & 먹거리 지도</h1>
      <p class="subtitle">번호 마커를 누르면 사진과 해시태그가 뜹니다. 뜬 카드를 한 번 더 누르면 네이버 지도로 바로 이동합니다.</p>
      <div class="filters" aria-label="지도 필터">
        <button class="filter active" data-filter="all">전체</button>
        <button class="filter" data-filter="cafe">카페</button>
        <button class="filter" data-filter="food">먹거리</button>
        <button id="fitAll">원위치</button>
      </div>
    </header>

    <main class="map-stage">
      <div id="map" aria-label="강릉 중앙동 지도"></div>
      <div class="legend" aria-label="범례">
        <span class="legend-pill"><i class="dot"></i>카페</span>
        <span class="legend-pill"><i class="dot food"></i>먹거리</span>
      </div>
      <section class="bottom-sheet" aria-label="장소 빠른 목록">
        <div id="placeRail" class="place-rail"></div>
      </section>
    </main>
  </div>

  <script>
    const fallbackImage = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='640' height='380' viewBox='0 0 640 380'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop stop-color='%23fff0a6'/%3E%3Cstop offset='.55' stop-color='%23bce4b9'/%3E%3Cstop offset='1' stop-color='%238bd3dd'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='640' height='380' fill='url(%23g)'/%3E%3Ccircle cx='120' cy='110' r='44' fill='%23fff' opacity='.55'/%3E%3Ccircle cx='520' cy='90' r='72' fill='%23fff' opacity='.38'/%3E%3Cpath d='M75 285c92-95 151-98 235-24 73 65 145 50 255-42v161H75z' fill='%231f7a5b' opacity='.28'/%3E%3Ctext x='50%25' y='48%25' text-anchor='middle' font-family='Arial,sans-serif' font-size='40' font-weight='800' fill='%231f241c'%3EGangneung%3C/text%3E%3Ctext x='50%25' y='61%25' text-anchor='middle' font-family='Arial,sans-serif' font-size='24' font-weight='700' fill='%236b735f'%3EGuide Map%3C/text%3E%3C/svg%3E";

    const defaultPlaces = [

      { id: "food-15299914", kind: "food", name: "감자바우 장칼국수", address: "강원 강릉시 금성로35번길 4", lat: 37.753082, lng: 128.8970482, link: "https://naver.me/GWe2NSOi", image: "https://naverbooking-phinf.pstatic.net/20240731_284/1722414199895E92se_JPEG/%BF%C3_%BF%A9%B8%A7%C8%DE%B0%A1%B4%C2_%B8%D4%B0%ED_%C2%EF%B4%C2_%B0%D4_%C3%D6%B0%ED%B0%AD%B8%AA_%BF%C0%BC%CC%B4%D9%B8%E9_%B0%AD%B8%AA%C1%DF%BE%D3%BD%C3%C0%E5%C0%B8%B7%CE%C1%DF%BE%D3%BD%C3%C0%E5%C7%CF%B8%E9_%B0%A8%C0%DA%B9%D9%BF%EC%B7%CE40%B3%E2_%C0%FC%C5%EB_%BF%CB%BD%C9%C0%CC%BF%CD_%C0%E5%C4%AE%B1%B9%BC%F6%B8%A6_%B8%D4%C0%BB_%BC%F6_%C0%D6%B4%C2_%B0%F7%B0%A8%C0%DA%B9%D9%BF%EC%BF%A1.jpg", desc: "중앙시장 가까운 장칼국수집. 옹심이와 장칼국수를 함께 노릴 수 있어 강릉 대표 메뉴를 함께 먹기 좋습니다.", tags: ["#옹심이", "#장칼국수", "#강릉대표메뉴"] }
    ];

    let currentFilter = "all";
    const defaultById = new Map(defaultPlaces.map(place => [place.id, place]));
    const places = loadPlaces();
    const mapContainer = document.getElementById("map");
    const markerOverlays = [];
    const markers = new Map();
    const rail = document.querySelector("#placeRail");
    let activeMapMode = "loading";
    let map = null;
    let popupOverlay = null;
    let fallbackPopupEl = null;

    function decodeData(value) {
      const base64 = value.replace(/-/g, "+").replace(/_/g, "/");
      const padded = base64.padEnd(Math.ceil(base64.length / 4) * 4, "=");
      return JSON.parse(decodeURIComponent(escape(atob(padded))));
    }

    function loadPlaces() {
      const hashMatch = location.hash.match(/data=([^&]+)/);
      if (!hashMatch) return normalizePlaces(defaultPlaces);
      try {
        return normalizePlaces(decodeData(hashMatch[1]));
      } catch (error) {
        alert("공유 링크 데이터를 읽지 못했습니다. 기본 지도로 표시합니다.");
        return normalizePlaces(defaultPlaces);
      }
    }

    function normalizePlaces(list) {
      return list.map((place, index) => ({
        id: String(place.id || `p-${index}`),
        kind: place.kind === "food" ? "food" : "cafe",
        name: String(place.name || "이름 없음"),
        address: String(place.address || ""),
        lat: Number(place.lat) || 37.7549,
        lng: Number(place.lng) || 128.8972,
        link: String(place.link || ""),
        image: String(place.image || defaultById.get(String(place.id))?.image || ""),
        desc: String(place.desc || ""),
        tags: Array.isArray(place.tags) ? place.tags.map(String) : []
      }));
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function visiblePlaces() {
      return places.filter(place => currentFilter === "all" || place.kind === currentFilter);
    }

    function imageOf(place) {
      return place.image || fallbackImage;
    }

    function linkOf(place) {
      return place.link || `https://map.naver.com/p/search/${encodeURIComponent(place.name)}`;
    }

    function closePopup() {
      if (popupOverlay) popupOverlay.setMap(null);
      if (fallbackPopupEl) {
        fallbackPopupEl.hidden = true;
        fallbackPopupEl.innerHTML = "";
      }
    }

    function popupFor(place) {
      return `
        <a class="place-popup" href="${escapeHtml(linkOf(place))}" target="_blank" rel="noreferrer" aria-label="${escapeHtml(place.name)} 네이버 지도 열기">
          <img src="${escapeHtml(imageOf(place))}" alt="" loading="lazy" onerror="this.src='${fallbackImage}'" />
          <div class="popup-body">
            <span class="popup-kicker">${place.kind === "food" ? "먹거리" : "카페"}</span>
            <h2 class="popup-title">${escapeHtml(place.name)}</h2>
            <p class="popup-desc">${escapeHtml(place.desc || place.address)}</p>
            <div class="popup-tags">${place.tags.map(tag => `<span>${escapeHtml(tag)}</span>`).join("")}</div>
            <div class="open-note">카드 터치해서 네이버 지도 열기</div>
          </div>
        </a>
      `;
    }

    function openPopupForPlace(place) {
      if (activeMapMode === "fallback") {
        openFallbackPopup(place);
        return;
      }

      closePopup();
      var popupContent = document.createElement('div');
      popupContent.innerHTML = popupFor(place);

      var position = new kakao.maps.LatLng(place.lat, place.lng);
      var point = map.getProjection().containerPointFromCoords(position);
      var shouldOpenBelow = point.y < 300;
      var xAnchor = 0.5;

      if (point.x < 170) xAnchor = 0.08;
      if (point.x > mapContainer.clientWidth - 170) xAnchor = 0.92;

      popupOverlay = new kakao.maps.CustomOverlay({
        map: null,
        clickable: true,
        xAnchor: xAnchor,
        yAnchor: shouldOpenBelow ? -0.12 : 1.08,
        zIndex: 9
      });
      popupOverlay.setContent(popupContent);
      popupOverlay.setPosition(position);
      popupOverlay.setMap(map);
    }

    function placeBounds() {
      return places.reduce((bounds, place) => ({
        minLat: Math.min(bounds.minLat, place.lat),
        maxLat: Math.max(bounds.maxLat, place.lat),
        minLng: Math.min(bounds.minLng, place.lng),
        maxLng: Math.max(bounds.maxLng, place.lng)
      }), {
        minLat: Infinity,
        maxLat: -Infinity,
        minLng: Infinity,
        maxLng: -Infinity
      });
    }

    function pointForPlace(place) {
      const bounds = placeBounds();
      const latRange = bounds.maxLat - bounds.minLat || 1;
      const lngRange = bounds.maxLng - bounds.minLng || 1;
      const x = 11 + ((place.lng - bounds.minLng) / lngRange) * 78;
      const y = 12 + ((bounds.maxLat - place.lat) / latRange) * 72;

      return {
        x: Math.min(89, Math.max(11, x)),
        y: Math.min(84, Math.max(12, y))
      };
    }

    function initFallbackMap() {
      activeMapMode = "fallback";
      map = null;
      popupOverlay = null;
      markerOverlays.length = 0;
      markers.clear();
      mapContainer.innerHTML = `
        <div class="fallback-map" aria-hidden="true"></div>
        <p class="map-status">카카오맵 연결 전까지 간단 지도로 표시 중입니다.</p>
        <div class="fallback-popup-wrap" hidden></div>
      `;
      fallbackPopupEl = mapContainer.querySelector(".fallback-popup-wrap");

      if (!mapContainer.dataset.fallbackBound) {
        mapContainer.addEventListener("click", event => {
          if (!event.target.closest(".fallback-marker, .fallback-popup-wrap")) closePopup();
        });
        mapContainer.dataset.fallbackBound = "true";
      }
    }

    function initKakaoMap() {
      activeMapMode = "kakao";
      fallbackPopupEl = null;
      mapContainer.innerHTML = "";

      const mapOption = {
        center: new kakao.maps.LatLng(37.7549, 128.8972),
        level: 4
      };
      map = new kakao.maps.Map(mapContainer, mapOption);

      popupOverlay = new kakao.maps.CustomOverlay({
        map: null,
        clickable: true,
        xAnchor: 0.5,
        yAnchor: 1.1,
        zIndex: 3
      });

      kakao.maps.event.addListener(map, "click", closePopup);
    }

    function bootMap() {
      const useFallback = () => {
        if (activeMapMode === "kakao") return;
        initFallbackMap();
        render();
      };

      if (!window.kakao || !kakao.maps || typeof kakao.maps.load !== "function") {
        useFallback();
        return;
      }

      const fallbackTimer = window.setTimeout(useFallback, 4500);
      kakao.maps.load(() => {
        window.clearTimeout(fallbackTimer);
        try {
          initKakaoMap();
          render();
          fitVisible();
        } catch (error) {
          useFallback();
        }
      });
    }

    function render() {
      if (activeMapMode === "loading") return;

      if (activeMapMode === "kakao") {
        markerOverlays.forEach(overlay => overlay.setMap(null));
        markerOverlays.length = 0;
      } else {
        mapContainer.querySelectorAll(".fallback-marker").forEach(marker => marker.remove());
      }

      markers.clear();
      rail.innerHTML = "";
      closePopup();

      visiblePlaces().forEach((place, index) => {
        var content = document.createElement(activeMapMode === "fallback" ? "button" : "div");
        content.className = `guide-marker ${place.kind === "food" ? "food" : ""}`;
        content.innerHTML = `<span>${index + 1}</span>`;

        if (activeMapMode === "fallback") {
          const point = pointForPlace(place);
          content.type = "button";
          content.classList.add("fallback-marker");
          content.style.left = `${point.x}%`;
          content.style.top = `${point.y}%`;
          content.setAttribute("aria-label", `${place.name} 열기`);
          content.addEventListener("click", function(e) {
            e.stopPropagation();
            openPopupForPlace(place);
          });
          mapContainer.appendChild(content);
          markers.set(place.id, { element: content, place: place });
          rail.appendChild(miniCard(place, index));
          return;
        }

        var position = new kakao.maps.LatLng(place.lat, place.lng);
        var customOverlay = new kakao.maps.CustomOverlay({
            position: position,
            content: content,
            xAnchor: 0.5,
            yAnchor: 1.0
        });

        customOverlay.setMap(map);
        markerOverlays.push(customOverlay);
        markers.set(place.id, { overlay: customOverlay, place: place });

        content.addEventListener('click', function(e) {
            e.stopPropagation();
            openPopupForPlace(place);
        });
        content.addEventListener('touchend', function(e) {
            e.stopPropagation();
            e.preventDefault();
            openPopupForPlace(place);
        });

        rail.appendChild(miniCard(place, index));
      });
    }

    function openFallbackPopup(place) {
      if (!fallbackPopupEl) return;
      const point = pointForPlace(place);
      const left = Math.min(86, Math.max(14, point.x));
      const top = Math.min(82, Math.max(18, point.y));

      fallbackPopupEl.innerHTML = popupFor(place);
      fallbackPopupEl.style.left = `${left}%`;
      fallbackPopupEl.style.top = `${top}%`;
      fallbackPopupEl.classList.toggle("below", point.y < 42);
      fallbackPopupEl.hidden = false;
    }

    function miniCard(place, index) {
      const card = document.createElement("button");
      card.className = "mini-card";
      card.type = "button";
      card.innerHTML = `
        <img src="${escapeHtml(imageOf(place))}" alt="" loading="lazy" onerror="this.src='${fallbackImage}'" />
        <span>
          <strong>${index + 1}. ${escapeHtml(place.name)}</strong>
          <span>${escapeHtml(place.tags.slice(0, 3).join(" "))}</span>
        </span>
      `;
      card.addEventListener("click", () => {
        if (map) {
          map.setLevel(3, { animate: true });
          map.setCenter(new kakao.maps.LatLng(place.lat, place.lng));
        }
        openPopupForPlace(place);
      });
      return card;
    }

    function fitVisible() {
      if (activeMapMode !== "kakao") return;
      if (markerOverlays.length === 0) return;
      var bounds = new kakao.maps.LatLngBounds();
      markerOverlays.forEach(overlay => {
        bounds.extend(overlay.getPosition());
      });
      map.setBounds(bounds);
    }

    document.querySelectorAll(".filter").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".filter").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        currentFilter = button.dataset.filter;
        render();
        fitVisible();
      });
    });

    document.querySelector("#fitAll").addEventListener("click", fitVisible);

    window.addEventListener("load", bootMap);
  </script>
</body>
</html>
